name: Update Aproviet Products

on:
  schedule:
    - cron: '0 * * * *' # Tự động chạy mỗi tiếng một lần (24 lần/ngày)
  workflow_dispatch: # Cho phép anh vào nhấn nút "Run workflow" để cập nhật ngay lập tức nếu muốn

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-data-analysis: '3.10'

    - name: Install dependencies
      run: |
        pip install pandas requests

    - name: Run update script
      run: python update_products.py # Chạy file script Python mà em đã gửi ở bước trước

# 🔴 ĐÂY LÀ BƯỚC QUAN TRỌNG ANH CẦN THÊM VÀO:
    - name: Commit and Push Changes back to GitHub
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Thêm tất cả file json mới và các file ảnh trong folder products vào danh sách hàng đợi
        git add static/products.json
        git add static/products/*
        
        # Kiểm tra xem có dữ liệu gì mới không, nếu có thì tiến hành commit và push
        if git diff --staged --quiet; then
          echo "Không có thay đổi nào mới về sản phẩm hoặc hình ảnh."
        else
          git commit -m "🤖 Tự động cập nhật nông sản và tải hình ảnh mới từ Google Drive [Automation]"
          git push
        fi
